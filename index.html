<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAWL OF THE ANCIENTS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Sarabun:wght@300;400;600&display=swap');

  :root {
    --gold: #D4AF37;
    --gold-light: #F5E182;
    --gold-dark: #8B6914;
    --red: #C0392B;
    --red-glow: #FF4444;
    --dark: #0A0608;
    --dark2: #130D10;
    --dark3: #1E1318;
    --panel: rgba(20,12,16,0.97);
    --border: rgba(212,175,55,0.4);
    --text: #E8D5B0;
    --muted: rgba(232,213,176,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  canvas { display: block; }

  /* ===== SCREENS ===== */
  .screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 100;
    background: radial-gradient(ellipse at center, #1a0a12 0%, #0A0608 70%);
  }
  .screen.hidden { display: none; }

  /* Particle bg */
  .screen::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(212,175,55,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 20%, rgba(212,175,55,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(192,57,43,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 70% 60%, rgba(212,175,55,0.15) 0%, transparent 100%);
    pointer-events: none;
  }

  .game-logo {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(212,175,55,0.5), 0 0 80px rgba(212,175,55,0.2);
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .game-subtitle {
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 1.5vw, 14px);
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px 40px;
    width: min(480px, 94vw);
    position: relative;
  }
  .panel::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .panel::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 20px; right: 20px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }

  input[type=text] {
    width: 100%;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 1px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: var(--gold); }

  .btn {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover::before { opacity: 0.1; }
  .btn:hover { border-color: var(--gold-light); color: var(--gold-light); }
  .btn:active { transform: scale(0.98); }
  .btn.secondary { border-color: var(--border); color: var(--muted); margin-top: 10px; }
  .btn.secondary:hover { border-color: var(--text); color: var(--text); }
  .btn.danger { border-color: var(--red); color: var(--red); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
    color: var(--muted); font-size: 11px; letter-spacing: 0.2em;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* CHARACTER SELECT */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .char-card {
    aspect-ratio: 1;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.15s;
    background: rgba(0,0,0,0.4);
    padding: 6px 4px;
  }
  .char-card:hover { border-color: var(--gold); background: rgba(212,175,55,0.05); }
  .char-card.selected { border-color: var(--gold); background: rgba(212,175,55,0.12); box-shadow: inset 0 0 20px rgba(212,175,55,0.08); }
  .char-card .char-icon { font-size: 22px; line-height: 1; }
  .char-card .char-name { font-size: 8px; letter-spacing: 0.05em; color: var(--muted); text-align: center; font-family: 'Cinzel', serif; }
  .char-card.selected .char-name { color: var(--gold); }
  .char-card .char-class { font-size: 7px; color: rgba(212,175,55,0.4); text-align: center; }

  /* LOBBY */
  .lobby-screen { background: radial-gradient(ellipse at center, #1a0a12 0%, #0A0608 70%); }

  .player-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 12px 0;
  }
  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 2px;
  }
  .player-row .picon { font-size: 20px; }
  .player-row .pname { flex: 1; font-size: 14px; }
  .player-row .pchar { font-size: 11px; color: var(--muted); }
  .player-row .pready { font-size: 11px; }
  .player-row .pready.yes { color: #4CAF50; }
  .player-row .pready.no { color: var(--muted); }
  .player-row .phost { font-size: 9px; color: var(--gold); letter-spacing: 0.15em; font-family: 'Cinzel', serif; }

  .room-code {
    text-align: center;
    margin-bottom: 20px;
  }
  .room-code .label { font-size: 10px; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 4px; }
  .room-code .code {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 32px;
    color: var(--gold);
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px rgba(212,175,55,0.4);
  }

  .stage-select {
    display: flex; gap: 8px; margin: 8px 0;
  }
  .stage-btn {
    flex: 1; padding: 8px 4px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.15s;
    text-align: center;
  }
  .stage-btn:hover { border-color: var(--gold); color: var(--gold); }
  .stage-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.08); }

  /* GAME HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    pointer-events: none;
    display: none;
  }
  #hud.visible { display: block; }

  .hud-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 16px;
    gap: 8px;
  }

  .player-hud-card {
    background: rgba(10,6,8,0.85);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 12px;
    min-width: 140px;
    position: relative;
  }
  .player-hud-card.is-me { border-color: rgba(212,175,55,0.6); }
  .phud-name { font-size: 11px; font-family: 'Cinzel', serif; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
  .phud-char { font-size: 9px; color: var(--muted); }
  .hp-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 1px; margin-top: 5px; }
  .hp-fill { height: 100%; background: var(--red-glow); border-radius: 1px; transition: width 0.2s; }
  .hp-fill.high { background: #4CAF50; }
  .hp-fill.med { background: #FFA500; }
  .phud-score { font-size: 11px; color: var(--gold); text-align: right; font-family: 'Cinzel', serif; }

  /* Skills bar */
  .skills-bar {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 8px;
    z-index: 50;
    pointer-events: none;
  }
  .skills-bar.visible { display: flex; }

  .skill-slot {
    width: 52px; height: 52px;
    background: rgba(10,6,8,0.9);
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    position: relative;
  }
  .skill-slot .sicon { font-size: 20px; }
  .skill-slot .skey { font-size: 9px; color: var(--gold); font-family: 'Cinzel', serif; }
  .skill-slot .scd {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: white;
    border-radius: 2px;
    display: none;
  }
  .skill-slot.on-cd .scd { display: flex; }

  /* Death screen */
  #death-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 12px;
  }
  #death-overlay.visible { display: flex; }
  #death-overlay .death-text {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 48px;
    color: var(--red);
    text-shadow: 0 0 40px rgba(192,57,43,0.8);
  }
  #death-overlay .respawn-text { font-size: 14px; color: var(--muted); letter-spacing: 0.2em; }

  /* Chat */
  #chat-container {
    position: fixed;
    bottom: 80px; left: 16px;
    width: 280px;
    z-index: 50;
    display: none;
  }
  #chat-container.visible { display: block; }
  #chat-log {
    height: 120px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
    margin-bottom: 8px;
  }
  .chat-msg {
    background: rgba(10,6,8,0.8);
    padding: 4px 8px;
    border-left: 2px solid var(--gold-dark);
    font-size: 12px;
    border-radius: 0 2px 2px 0;
  }
  .chat-msg .from { color: var(--gold); font-family: 'Cinzel', serif; font-size: 10px; }
  #chat-input-wrap {
    display: flex; gap: 6px;
    pointer-events: all;
  }
  #chat-input {
    flex: 1;
    background: rgba(10,6,8,0.9);
    border: 1px solid var(--border);
    border-radius: 1px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
  }
  #chat-send {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    border-radius: 1px;
    pointer-events: all;
  }

  /* Controls hint */
  #controls-hint {
    position: fixed;
    bottom: 16px; right: 16px;
    background: rgba(10,6,8,0.8);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--muted);
    z-index: 50;
    line-height: 1.8;
    display: none;
  }
  #controls-hint.visible { display: block; }
  #controls-hint span { color: var(--gold); font-family: 'Cinzel', serif; }

  .error-msg { color: var(--red); font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; }
  .info-msg { color: var(--gold); font-size: 12px; text-align: center; margin-top: 8px; }

  /* Scoreboard */
  #scoreboard {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px 32px;
    z-index: 300;
    display: none;
    min-width: 320px;
  }
  #scoreboard.visible { display: block; }
  #scoreboard h2 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 16px;
  }
  .score-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(212,175,55,0.1);
    font-size: 13px;
  }
  .score-row .rank { color: var(--gold); font-family: 'Cinzel', serif; width: 24px; }
  .score-row .sname { flex: 1; }
  .score-row .spts { color: var(--gold); font-family: 'Cinzel', serif; }
  .score-row .sdead { color: var(--muted); font-size: 11px; }

  #game-canvas { position: fixed; top: 0; left: 0; display: none; }
  #game-canvas.visible { display: block; }

  /* Flicker animation for logo */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }
  .game-logo { animation: flicker 8s infinite; }
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="screen-menu" class="screen">
  <div class="game-logo">BRAWL OF<br>THE ANCIENTS</div>
  <div class="game-subtitle">⚔ &nbsp; The Eternal Arena &nbsp; ⚔</div>
  <div class="panel">
    <div class="panel-title">Enter the Realm</div>
    <label>ชื่อนักรบ</label>
    <input type="text" id="input-name" placeholder="ตั้งชื่อตัวเอง..." maxlength="16">
    <label>เลือกตัวละคร</label>
    <div class="char-grid" id="char-grid"></div>
    <button class="btn" onclick="goToLobbyMenu()">⚔ เข้าสู่สนามรบ</button>
    <div class="error-msg" id="menu-error"></div>
  </div>
</div>

<!-- LOBBY SELECT -->
<div id="screen-lobby-select" class="screen hidden">
  <div class="game-logo" style="font-size:clamp(20px,3vw,36px);margin-bottom:6px">BRAWL OF THE ANCIENTS</div>
  <div class="game-subtitle" style="margin-bottom:32px">⚔ The Eternal Arena ⚔</div>
  <div class="panel">
    <div class="panel-title">เลือกสนามรบ</div>
    <button class="btn" onclick="createRoom()">🏛 สร้างห้อง (Host)</button>
    <div class="divider">หรือ</div>
    <label>รหัสห้อง</label>
    <input type="text" id="input-room-code" placeholder="ใส่รหัส 6 ตัว..." maxlength="6" style="text-transform:uppercase;text-align:center;font-family:'Cinzel Decorative',cursive;font-size:20px;letter-spacing:0.3em">
    <button class="btn secondary" onclick="joinRoom()">🗡 เข้าร่วมห้อง</button>
    <button class="btn secondary" onclick="showScreen('screen-menu')">← กลับ</button>
    <div class="error-msg" id="lobby-error"></div>
  </div>
</div>

<!-- LOBBY ROOM -->
<div id="screen-lobby-room" class="screen hidden lobby-screen">
  <div class="panel" style="width:min(520px,94vw)">
    <div class="room-code">
      <div class="label">รหัสห้อง — แชร์ให้เพื่อน</div>
      <div class="code" id="display-room-code">XXXXXX</div>
    </div>
    <div class="panel-title" id="lobby-title">ห้องรอเกม (1/5)</div>
    <div id="player-list" class="player-list"></div>

    <div id="stage-section" style="display:none;margin-top:16px">
      <label>เลือกด่าน (Host เท่านั้น)</label>
      <div class="stage-select" id="stage-select"></div>
    </div>

    <div id="host-controls" style="display:none">
      <button class="btn" id="start-btn" onclick="startGame()">⚔ START BATTLE</button>
    </div>
    <div id="guest-controls">
      <button class="btn" id="ready-btn" onclick="toggleReady()">✓ พร้อมแล้ว</button>
    </div>
    <div class="info-msg" id="lobby-info"></div>
    <div class="error-msg" id="room-error"></div>
  </div>
</div>

<!-- GAME CANVAS -->
<canvas id="game-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-top" id="hud-players"></div>
</div>

<!-- SKILLS -->
<div class="skills-bar" id="skills-bar"></div>

<!-- DEATH -->
<div id="death-overlay">
  <div class="death-text">DEFEATED</div>
  <div class="respawn-text" id="respawn-countdown">กำลังกลับมา... 3</div>
</div>

<!-- CHAT -->
<div id="chat-container">
  <div id="chat-log"></div>
  <div id="chat-input-wrap">
    <input type="text" id="chat-input" placeholder="พิมพ์ข้อความ... (Enter)" maxlength="80">
    <button id="chat-send" onclick="sendChat()">ส่ง</button>
  </div>
</div>

<!-- SCOREBOARD -->
<div id="scoreboard">
  <h2>⚔ SCOREBOARD (Tab)</h2>
  <div id="score-list"></div>
</div>

<!-- CONTROLS HINT -->
<div id="controls-hint">
  <span>WASD/Arrow</span> เคลื่อนที่<br>
  <span>Z</span> โจมตี&nbsp;&nbsp;<span>X</span> สกิล 1<br>
  <span>C</span> สกิล 2&nbsp;&nbsp;<span>V</span> สกิล 3<br>
  <span>Tab</span> สกอร์&nbsp;&nbsp;<span>Enter</span> แชท
</div>

// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById(id);
  if (el) el.classList.remove('hidden');
}

function goToLobbyMenu() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { document.getElementById('menu-error').textContent = 'กรุณาใส่ชื่อก่อนนะ!'; return; }
  myName = name;
  document.getElementById('menu-error').textContent = '';
  connectWebSocket(() => showScreen('screen-lobby-select'));
}

// ============================================================
//  WEBSOCKET
// ============================================================
function connectWebSocket(onConnect) {
  if (ws && ws.readyState === WebSocket.OPEN) { onConnect && onConnect(); return; }
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.host}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => { onConnect && onConnect(); };
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
  ws.onerror = () => { showError('เชื่อมต่อ Server ไม่ได้ กรุณาลองใหม่'); };
  ws.onclose = () => {
    if (gameRunning) addChat('System', 'หลุดการเชื่อมต่อ...');
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'connected':
      myPlayerId = msg.playerId;
      break;
    case 'room_created':
      myRoomId = msg.roomId;
      isHost = true;
      roomState = msg.state;
      showLobbyRoom(msg.state);
      break;
    case 'room_joined':
      myRoomId = msg.roomId;
      isHost = false;
      roomState = msg.state;
      showLobbyRoom(msg.state);
      break;
    case 'room_update':
    case 'player_joined':
    case 'player_left':
      roomState = msg.state;
      updateLobbyUI(msg.state);
      break;
    case 'game_start':
      roomState = msg.state;
      startGameClient(msg.state);
      break;
    case 'player_state':
      if (remotePlayers[msg.playerId]) {
        Object.assign(remotePlayers[msg.playerId], { x: msg.x, y: msg.y, vx: msg.vx, vy: msg.vy, facing: msg.facing, state: msg.state, hp: msg.hp });
        if (msg.action) spawnEffect(msg.x, msg.y, msg.action, remotePlayers[msg.playerId].charData?.color || '#fff');
      }
      break;
    case 'player_hit':
      handleHitEffect(msg);
      break;
    case 'player_respawn':
      if (msg.playerId === myPlayerId) {
        isAlive = true;
        myPlayer.hp = msg.hp;
        myPlayer.x = msg.x; myPlayer.y = msg.y;
        document.getElementById('death-overlay').classList.remove('visible');
        clearTimeout(respawnTimer);
      } else if (remotePlayers[msg.playerId]) {
        remotePlayers[msg.playerId].hp = msg.hp;
        remotePlayers[msg.playerId].x = msg.x;
        remotePlayers[msg.playerId].y = msg.y;
      }
      break;
    case 'score_update':
      scores = {};
      msg.scores.forEach(s => { scores[s.id] = s; });
      updateScoreboard();
      updateHUD();
      break;
    case 'skill_cast':
      handleRemoteSkill(msg);
      break;
    case 'chat':
      addChat(msg.from, msg.msg);
      break;
    case 'error':
      showError(msg.msg);
      break;
  }
}

function showError(msg) {
  ['menu-error','lobby-error','room-error'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = msg;
  });
}

function createRoom() {
  send({ type: 'create_room', name: myName, character: myCharId, stage: 1 });
}

function joinRoom() {
  const code = document.getElementById('input-room-code').value.trim().toUpperCase();
  if (!code || code.length !== 6) { document.getElementById('lobby-error').textContent = 'รหัสต้อง 6 ตัว'; return; }
  send({ type: 'join_room', roomId: code, name: myName, character: myCharId });
}

function showLobbyRoom(state) {
  showScreen('screen-lobby-room');
  document.getElementById('display-room-code').textContent = state.id;

  // stage buttons (host only)
  const stageSection = document.getElementById('stage-section');
  const stageSelect = document.getElementById('stage-select');
  if (isHost) {
    stageSection.style.display = 'block';
    stageSelect.innerHTML = '';
    STAGES.forEach(st => {
      const b = document.createElement('button');
      b.className = 'stage-btn' + (st.id === state.stage ? ' active' : '');
      b.textContent = st.name;
      b.onclick = () => {
        document.querySelectorAll('.stage-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        send({ type: 'change_stage', stage: st.id });
      };
      stageSelect.appendChild(b);
    });
  } else {
    stageSection.style.display = 'none';
  }

  document.getElementById('host-controls').style.display = isHost ? 'block' : 'none';
  document.getElementById('guest-controls').style.display = isHost ? 'none' : 'block';
  updateLobbyUI(state);
}

function updateLobbyUI(state) {
  roomState = state;
  const list = document.getElementById('player-list');
  document.getElementById('lobby-title').textContent = `ห้องรอเกม (${state.players.length}/5)`;
  list.innerHTML = '';
  state.players.forEach(p => {
    const ch = CHARACTERS.find(c => c.id === p.character) || CHARACTERS[0];
    const isMe = p.id === myPlayerId;
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <span class="picon">${ch.icon}</span>
      <div>
        <div class="pname">${p.name}${isMe ? ' (คุณ)' : ''} ${p.id === state.host ? '<span class="phost">HOST</span>' : ''}</div>
        <div class="pchar">${ch.name} · ${ch.class}</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div class="pready ${p.ready || p.id === state.host ? 'yes' : 'no'}">${p.ready || p.id === state.host ? '✓ พร้อม' : '○ รอ'}</div>
      </div>
    `;
    list.appendChild(row);
  });

  // Update stage buttons
  if (isHost) {
    document.querySelectorAll('.stage-btn').forEach((b, i) => {
      b.classList.toggle('active', STAGES[i]?.id === state.stage);
    });
  } else {
    const stageName = STAGES.find(s => s.id === state.stage)?.name || '';
    document.getElementById('lobby-info').textContent = stageName ? `ด่าน: ${stageName}` : '';
  }

  const allReady = state.players.filter(p => p.id !== state.host).every(p => p.ready);
  const startBtn = document.getElementById('start-btn');
  if (startBtn) {
    startBtn.disabled = state.players.length < 1;
    startBtn.style.opacity = allReady ? '1' : '0.6';
  }
}

function toggleReady() {
  isReady = !isReady;
  send({ type: 'set_ready', ready: isReady });
  document.getElementById('ready-btn').textContent = isReady ? '✓ พร้อมแล้ว!' : '○ ยังไม่พร้อม';
  document.getElementById('ready-btn').style.color = isReady ? '#4CAF50' : '';
  document.getElementById('ready-btn').style.borderColor = isReady ? '#4CAF50' : '';
}

function startGame() { send({ type: 'start_game' }); }

//  GAME INIT
// ============================================================
function startGameClient(state) {
  showScreen('');
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  gameRunning = true;

  currentStage = STAGES.find(s => s.id === state.stage) || STAGES[0];

  const canvas = document.getElementById('game-canvas');
  canvas.classList.add('visible');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Build players
  remotePlayers = {};
  myPlayer = null;

  state.players.forEach(p => {
    const ch = CHARACTERS.find(c => c.id === p.character) || CHARACTERS[0];
    const pd = {
      id: p.id, name: p.name, character: p.character, charData: ch,
      x: p.x, y: p.y, hp: p.hp, maxHp: ch.maxHp,
      vx: 0, vy: 0, onGround: false, facing: 1,
      state: 'idle', score: 0, deaths: 0,
      width: 36, height: 54,
    };
    if (p.id === myPlayerId) {
      myPlayer = pd;
      isAlive = true;
    } else {
      remotePlayers[p.id] = pd;
    }
  });

  // Init skills cooldown
  if (myPlayer) {
    const ch = myPlayer.charData;
    ch.skills.forEach(sk => { skillCooldowns[sk.id] = 0; });
  }

  buildHUD(state);
  buildSkillsBar();
  document.getElementById('hud').classList.add('visible');
  document.getElementById('skills-bar').classList.add('visible');
  document.getElementById('chat-container').classList.add('visible');
  document.getElementById('controls-hint').classList.add('visible');

  projectiles = []; effects = [];
  scores = {};
  state.players.forEach(p => { scores[p.id] = { id: p.id, name: p.name, score: 0, deaths: 0 }; });

  gameLoop();
}

// ============================================================
//  HUD
// ============================================================
function buildHUD(state) {
  const container = document.getElementById('hud-players');
  container.innerHTML = '';
  state.players.forEach(p => {
    const ch = CHARACTERS.find(c => c.id === p.character) || CHARACTERS[0];
    const div = document.createElement('div');
    div.className = 'player-hud-card' + (p.id === myPlayerId ? ' is-me' : '');
    div.id = `hud-${p.id}`;
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:16px">${ch.icon}</span>
        <div>
          <div class="phud-name">${p.name}</div>
          <div class="phud-char">${ch.class}</div>
        </div>
        <div class="phud-score" style="margin-left:auto" id="score-${p.id}">0</div>
      </div>
      <div class="hp-bar"><div class="hp-fill high" id="hp-${p.id}" style="width:100%"></div></div>
    `;
    container.appendChild(div);
  });
}

function updateHUD() {
  const allPlayers = myPlayer ? [myPlayer, ...Object.values(remotePlayers)] : Object.values(remotePlayers);
  allPlayers.forEach(p => {
    const hpEl = document.getElementById(`hp-${p.id}`);
    const scoreEl = document.getElementById(`score-${p.id}`);
    if (hpEl) {
      const pct = Math.max(0, (p.hp / p.maxHp) * 100);
      hpEl.style.width = pct + '%';
      hpEl.className = 'hp-fill ' + (pct > 60 ? 'high' : pct > 30 ? 'med' : '');
    }
    if (scoreEl && scores[p.id]) scoreEl.textContent = scores[p.id].score;
  });
}

function buildSkillsBar() {
  const bar = document.getElementById('skills-bar');
  bar.innerHTML = '';
  if (!myPlayer) return;
  const ch = myPlayer.charData;
  ch.skills.forEach(sk => {
    const slot = document.createElement('div');
    slot.className = 'skill-slot';
    slot.id = `skill-${sk.id}`;
    slot.innerHTML = `<span class="sicon">${sk.icon}</span><span class="skey">${sk.key}</span><div class="scd" id="scd-${sk.id}">0</div>`;
    bar.appendChild(slot);
  });
}

function updateSkillsBar() {
  if (!myPlayer) return;
  const now = Date.now();
  myPlayer.charData.skills.forEach(sk => {
    const slot = document.getElementById(`skill-${sk.id}`);
    const cdEl = document.getElementById(`scd-${sk.id}`);
    if (!slot || !cdEl) return;
    const remaining = skillCooldowns[sk.id] - now;
    if (remaining > 0) {
      slot.classList.add('on-cd');
      cdEl.textContent = Math.ceil(remaining / 1000);
    } else {
      slot.classList.remove('on-cd');
    }
  });
}

//  SCOREBOARD
// ============================================================
function updateScoreboard() {
  const list = document.getElementById('score-list');
  const sorted = Object.values(scores).sort((a, b) => b.score - a.score);
  list.innerHTML = '';
  sorted.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `<span class="rank">#${i+1}</span><span class="sname">${s.name}${s.id === myPlayerId ? ' ★' : ''}</span><span class="sdead">💀 ${s.deaths || 0}</span><span class="spts">${s.score} pts</span>`;
    list.appendChild(row);
  });
}

// ============================================================
//  CHAT
// ============================================================
function addChat(from, text) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<div class="from">${from}</div><div>${text}</div>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  if (log.children.length > 30) log.removeChild(log.firstChild);
}

function sendChat() {
  const inp = document.getElementById('chat-input');
  if (!inp.value.trim()) return;
  send({ type: 'chat', msg: inp.value.trim() });
  inp.value = '';
}

// ============================================================
//  PHYSICS & GAME LOOP
// ============================================================
const GRAVITY = 0.55;
const GROUND_Y = 466; // canvas height - platform height
const CAM = { x: 0, y: 0 };
const WORLD_W = 840;
const WORLD_H = 600;

function getPlatforms() { return currentStage?.platforms || []; }
function getStageWidth() { return WORLD_W; }

function updatePlayer(p, dt) {
  if (!isAlive && p === myPlayer) return;

  // Gravity
  p.vy += GRAVITY;

  // Horizontal friction
  if (p.onGround) p.vx *= 0.82;
  else p.vx *= 0.94;

  p.x += p.vx;
  p.y += p.vy;

  // Platform collision
  p.onGround = false;
  getPlatforms().forEach(plat => {
    if (
      p.x + p.width > plat.x &&
      p.x < plat.x + plat.w &&
      p.y + p.height > plat.y &&
      p.y + p.height < plat.y + plat.h + 20 &&
      p.vy >= 0
    ) {
      p.y = plat.y - p.height;
      p.vy = 0;
      p.onGround = true;
    }
  });

  // World bounds
  if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x + p.width > getStageWidth()) { p.x = getStageWidth() - p.width; p.vx = 0; }

  // Fell off
  if (p.y > WORLD_H + 50) {
    if (p === myPlayer) {
      p.hp = 0;
      onMyDeath();
    }
  }
}

function handleInput() {
  if (!myPlayer || !isAlive) return;
  const ch = myPlayer.charData;
  const spd = ch.speed;

  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { myPlayer.vx -= spd * 0.4; myPlayer.facing = -1; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { myPlayer.vx += spd * 0.4; myPlayer.facing = 1; }
  if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && myPlayer.onGround) {
    myPlayer.vy = -ch.jumpPower;
    myPlayer.onGround = false;
  }

  // Clamp speed
  myPlayer.vx = Math.max(-spd, Math.min(spd, myPlayer.vx));

  // State
  if (!myPlayer.onGround) myPlayer.state = myPlayer.vy < 0 ? 'jump' : 'fall';
  else if (Math.abs(myPlayer.vx) > 0.5) myPlayer.state = 'run';
  else myPlayer.state = 'idle';
}

function trySkill(skillIndex) {
  if (!myPlayer || !isAlive) return;
  const ch = myPlayer.charData;
  const skill = ch.skills[skillIndex];
  if (!skill) return;
  const now = Date.now();
  if (skillCooldowns[skill.id] > now) return;

  skillCooldowns[skill.id] = now + skill.cooldown;

  // Self heal
  if (skill.type === 'heal') {
    myPlayer.hp = Math.min(myPlayer.maxHp, myPlayer.hp + Math.abs(skill.damage));
    spawnEffect(myPlayer.x + myPlayer.width/2, myPlayer.y, 'heal', '#82E0AA');
    send({ type: 'player_input', ...getMyState(), action: skill.id });
    return;
  }

  // Dash
  if (skill.type === 'dash') {
    myPlayer.vx = myPlayer.facing * skill.range * 0.08;
    myPlayer.vy = -4;
  }

  // Spawn projectile or AOE
  if (skill.type === 'projectile') {
    spawnProjectile(myPlayer, skill);
  } else if (skill.type === 'aoe') {
    spawnAOE(myPlayer, skill);
  } else {
    // melee
    doMeleeHit(myPlayer, skill);
  }

  send({ type: 'skill_cast', skillId: skill.id, x: myPlayer.x, y: myPlayer.y, facing: myPlayer.facing });
  spawnEffect(myPlayer.x + myPlayer.width/2, myPlayer.y + myPlayer.height/2, skill.id, skill.color);
}

function getMyState() {
  if (!myPlayer) return {};
  return {
    x: myPlayer.x, y: myPlayer.y,
    vx: myPlayer.vx, vy: myPlayer.vy,
    onGround: myPlayer.onGround,
    facing: myPlayer.facing,
    state: myPlayer.state,
    hp: myPlayer.hp,
  };
}

function sendInput() {
  const now = Date.now();
  if (now - lastInputSent < 40) return;
  lastInputSent = now;
  send({ type: 'player_input', ...getMyState() });
}

// ============================================================
//  COMBAT
// ============================================================
function doMeleeHit(attacker, skill) {
  const all = attacker === myPlayer ? Object.values(remotePlayers) : (myPlayer ? [myPlayer] : []);
  all.forEach(target => {
    const dx = (target.x + target.width/2) - (attacker.x + attacker.width/2);
    const dy = (target.y + target.height/2) - (attacker.y + attacker.height/2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    const inFront = (attacker.facing > 0 ? dx > 0 : dx < 0);
    if (dist < skill.range && inFront) {
      dealDamage(target, skill.damage, skill.id);
    }
  });
}

function spawnProjectile(owner, skill) {
  projectiles.push({
    x: owner.x + owner.width/2, y: owner.y + owner.height/2,
    vx: owner.facing * 8,
    vy: 0,
    damage: skill.damage, skillId: skill.id,
    color: skill.color, radius: 8,
    owner: owner.id || myPlayerId,
    life: 60,
  });
}

function spawnAOE(owner, skill) {
  const cx = owner.x + owner.width/2;
  const cy = owner.y + owner.height/2;
  spawnEffect(cx, cy, skill.id, skill.color, 80);

  const all = owner === myPlayer ? Object.values(remotePlayers) : (myPlayer ? [myPlayer] : []);
  all.forEach(target => {
    const dx = (target.x + target.width/2) - cx;
    const dy = (target.y + target.height/2) - cy;
    if (Math.sqrt(dx*dx + dy*dy) < skill.range) {
      dealDamage(target, skill.damage, skill.id);
    }
  });
}

function spawnEffect(x, y, id, color, radius = 40) {
  effects.push({ x, y, color: color || '#fff', radius, maxRadius: radius, life: 30, maxLife: 30, id });
}

function dealDamage(target, damage, skillId) {
  if (!isAlive && target === myPlayer) return;
  send({ type: 'player_hit', targetId: target.id || (target === myPlayer ? myPlayerId : null), damage, skillId });
  spawnEffect(target.x + target.width/2, target.y + target.height/2, skillId, '#FF4444', 30);

  if (target === myPlayer) {
    myPlayer.hp = Math.max(0, myPlayer.hp - damage);
    if (myPlayer.hp <= 0) onMyDeath();
  } else {
    target.hp = Math.max(0, target.hp - damage);
  }
}

function handleHitEffect(msg) {
  const target = msg.targetId === myPlayerId ? myPlayer : remotePlayers[msg.targetId];
  if (target) {
    target.hp = msg.hp;
    spawnEffect(target.x + target.width/2, target.y + target.height/2, msg.skillId, '#FF4444', 35);
    if (msg.hp <= 0 && msg.targetId !== myPlayerId) {
      // remote death flash
      spawnEffect(target.x + target.width/2, target.y + target.height/2, 'death', '#FF0000', 60);
    }
  }
}

function handleRemoteSkill(msg) {
  const p = remotePlayers[msg.playerId];
  if (!p) return;
  const ch = p.charData;
  const skill = ch?.skills?.find(s => s.id === msg.skillId);
  if (!skill) return;
  spawnEffect(msg.x + 18, msg.y + 27, msg.skillId, skill.color, 50);

  if (skill.type === 'projectile') {
    projectiles.push({
      x: msg.x + 18, y: msg.y + 27,
      vx: msg.facing * 8, vy: 0,
      damage: skill.damage, skillId: skill.id,
      color: skill.color, radius: 8,
      owner: msg.playerId, life: 60,
    });
  } else if (skill.type === 'aoe' || skill.type === 'melee' || skill.type === 'dash') {
    // damage handled server-side
  }
}

function onMyDeath() {
  isAlive = false;
  const overlay = document.getElementById('death-overlay');
  overlay.classList.add('visible');
  let count = 3;
  document.getElementById('respawn-countdown').textContent = `กำลังกลับมา... ${count}`;
  respawnTimer = setInterval(() => {
    count--;
    document.getElementById('respawn-countdown').textContent = count > 0 ? `กำลังกลับมา... ${count}` : 'กำลังฟื้นคืนชีพ...';
    if (count <= 0) clearInterval(respawnTimer);
  }, 1000);
}

// ============================================================
//  UPDATE PROJECTILES & EFFECTS
// ============================================================
function updateProjectiles() {
  const canvas = document.getElementById('game-canvas');
  const W = canvas.width, H = canvas.height;
  const scaleX = W / WORLD_W, scaleY = H / WORLD_H;

  projectiles = projectiles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += GRAVITY * 0.1;
    p.life--;

    if (p.life <= 0 || p.x < -100 || p.x > WORLD_W + 100) return false;

    // Platform collision
    let hit = false;
    getPlatforms().forEach(plat => {
      if (p.x > plat.x && p.x < plat.x + plat.w && p.y > plat.y && p.y < plat.y + plat.h) hit = true;
    });
    if (hit) { spawnEffect(p.x, p.y, p.skillId, p.color, 25); return false; }

    // Hit check (only for my projectiles)
    if (p.owner === myPlayerId) {
      Object.values(remotePlayers).forEach(target => {
        if (!target) return;
        const dx = (target.x + target.width/2) - p.x;
        const dy = (target.y + target.height/2) - p.y;
        if (Math.sqrt(dx*dx + dy*dy) < p.radius + 20) {
          dealDamage(target, p.damage, p.skillId);
          spawnEffect(p.x, p.y, p.skillId, p.color, 30);
          p.life = 0;
        }
      });
    }

    return p.life > 0;
  });

  effects = effects.filter(e => { e.life--; return e.life > 0; });
}

// ============================================================
//  CAMERA
// ============================================================
function updateCamera(canvas) {
  if (!myPlayer) return;
  const targetX = myPlayer.x + myPlayer.width/2 - canvas.width/2;
  const targetY = myPlayer.y + myPlayer.height/2 - canvas.height/2;
  const maxX = Math.max(0, WORLD_W - canvas.width / (canvas.width / WORLD_W));
  CAM.x += (targetX - CAM.x) * 0.12;
  CAM.y += (targetY - CAM.y) * 0.12;
  CAM.x = Math.max(0, Math.min(CAM.x, 0)); // for now, horizontal camera static
  CAM.y = Math.max(-80, Math.min(CAM.y, 0));
}

// ============================================================
//  RENDER
// ============================================================
function render(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scaleX = W / WORLD_W;
  const scaleY = H / WORLD_H;

  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const stage = currentStage;
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, stage.bg[0]);
  grad.addColorStop(0.5, stage.bg[1]);
  grad.addColorStop(1, stage.bg[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background stars
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137 + 50) % WORLD_W) * scaleX;
    const sy = ((i * 97 + 30) % 400) * scaleY;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Pillars
  stage.pillars.forEach(pl => {
    const px = pl.x * scaleX, py = pl.y * scaleY;
    const pw = pl.w * scaleX, ph = pl.h * scaleY;
    ctx.fillStyle = pl.color;
    ctx.fillRect(px, py, pw, ph);
    // decor lines
    ctx.fillStyle = stage.decorColor + '33';
    ctx.fillRect(px + 2, py, 3 * scaleX, ph);
    ctx.fillRect(px + pw - 5 * scaleX, py, 3 * scaleX, ph);
  });

  // Platforms
  stage.platforms.forEach(plat => {
    const px = plat.x * scaleX, py = plat.y * scaleY;
    const pw = plat.w * scaleX, ph = plat.h * scaleY;
    ctx.fillStyle = plat.color;
    ctx.fillRect(px, py, pw, ph);
    // Top edge highlight
    ctx.fillStyle = stage.decorColor + '55';
    ctx.fillRect(px, py, pw, 3);
    // Stone texture lines
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    for (let xi = 0; xi < pw; xi += 30 * scaleX) {
      ctx.fillRect(px + xi, py + 3, 1, ph - 3);
    }
  });

  // Projectiles
  projectiles.forEach(p => {
    const px = p.x * scaleX, py = p.y * scaleY;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(px, py, p.radius * Math.min(scaleX, scaleY), 0, Math.PI * 2);
    ctx.fill();
    // Trail
    ctx.fillStyle = p.color + '44';
    ctx.beginPath();
    ctx.arc(px - p.vx * scaleX * 2, py - p.vy * scaleY * 2, p.radius * Math.min(scaleX, scaleY) * 0.6, 0, Math.PI * 2);
    ctx.fill();
  });

  // Effects
  effects.forEach(e => {
    const alpha = e.life / e.maxLife;
    const r = e.radius * (1 - alpha * 0.5) * Math.min(scaleX, scaleY);
    const ex = e.x * scaleX, ey = e.y * scaleY;
    ctx.strokeStyle = e.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ex, ey, r, 0, Math.PI * 2);
    ctx.stroke();
    if (r > 15) {
      ctx.beginPath();
      ctx.arc(ex, ey, r * 0.5, 0, Math.PI * 2);
      ctx.stroke();
    }
  });

  // Remote players
  Object.values(remotePlayers).forEach(p => drawPlayer(ctx, p, scaleX, scaleY, false));
  // My player
  if (myPlayer && isAlive) drawPlayer(ctx, myPlayer, scaleX, scaleY, true);
}

function drawPlayer(ctx, p, sx, sy, isMe) {
  const x = p.x * sx, y = p.y * sy;
  const w = p.width * sx, h = p.height * sy;
  const ch = p.charData;
  const color = ch?.color || '#D4AF37';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.ellipse(x + w/2, y + h + 2, w * 0.45, 5 * sy, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.save();
  ctx.translate(x + w/2, y + h/2);
  if (p.facing < 0) ctx.scale(-1, 1);

  // Legs
  const legOff = (p.state === 'run' ? Math.sin(Date.now() * 0.015) * 5 * sy : 0);
  ctx.fillStyle = color + 'CC';
  ctx.fillRect(-w*0.18, h*0.2, w*0.16, h*0.38 + legOff);
  ctx.fillRect(w*0.02, h*0.2, w*0.16, h*0.38 - legOff);

  // Torso
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-w*0.32, -h*0.25, w*0.64, h*0.48, 3);
  ctx.fill();

  // Shoulder pads
  ctx.fillStyle = color + 'EE';
  ctx.fillRect(-w*0.42, -h*0.22, w*0.14, h*0.22);
  ctx.fillRect(w*0.28, -h*0.22, w*0.14, h*0.22);

  // Head
  ctx.fillStyle = color + 'DD';
  ctx.beginPath();
  ctx.arc(0, -h*0.38, w*0.26, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.fillRect(w*0.04, -h*0.44, w*0.1, h*0.08);
  ctx.fillStyle = '#000';
  ctx.fillRect(w*0.06, -h*0.43, w*0.06, h*0.06);

  // Emoji icon on chest
  ctx.restore();
  ctx.font = `${w * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(ch?.icon || '?', x + w/2, y + h/2 - h*0.05);

  // Name tag
  ctx.font = `bold ${Math.max(9, 11 * Math.min(sx,sy))}px Cinzel, serif`;
  ctx.fillStyle = isMe ? '#F5E182' : '#E8D5B0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(p.name, x + w/2, y - 4);

  // HP bar (above name)
  const bw = w * 1.2, bh = 4 * sy;
  const bx = x + w/2 - bw/2, by = y - 18 * sy;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx, by, bw, bh);
  const hpPct = Math.max(0, p.hp / (p.maxHp || 100));
  ctx.fillStyle = hpPct > 0.6 ? '#4CAF50' : hpPct > 0.3 ? '#FFA500' : '#FF4444';
  ctx.fillRect(bx, by, bw * hpPct, bh);

  // "ME" indicator
  if (isMe) {
    ctx.fillStyle = '#F5E182';
    ctx.font = `${8 * Math.min(sx,sy)}px Cinzel, serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('▲', x + w/2, by - 2);
  }
}

// ============================================================
//  GAME LOOP
// ============================================================
let lastFrame = 0;
function gameLoop(ts = 0) {
  if (!gameRunning) return;
  const dt = ts - lastFrame;
  lastFrame = ts;

  const canvas = document.getElementById('game-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  handleInput();
  if (myPlayer) updatePlayer(myPlayer, dt);
  Object.values(remotePlayers).forEach(p => updatePlayer(p, dt));
  updateProjectiles();
  updateCamera(canvas);
  render(canvas);
  updateHUD();
  updateSkillsBar();
  sendInput();

  requestAnimationFrame(gameLoop);
}

// ============================================================
//  INPUT HANDLING
// ============================================================
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;

  // Skills
  if (gameRunning && document.activeElement !== document.getElementById('chat-input')) {
    if (e.key === 'z' || e.key === 'Z') trySkill(0);
    if (e.key === 'x' || e.key === 'X') trySkill(1);
    if (e.key === 'c' || e.key === 'C') trySkill(2);
    if (e.key === 'v' || e.key === 'V') trySkill(3);
  }

  // Scoreboard
  if (e.key === 'Tab') {
    e.preventDefault();
    document.getElementById('scoreboard').classList.toggle('visible');
  }

  // Chat
  if (e.key === 'Enter') {
    const chatInp = document.getElementById('chat-input');
    if (document.activeElement === chatInp) {
      sendChat();
      chatInp.blur();
    } else if (gameRunning) {
      chatInp.focus();
    }
  }
});

document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Mobile touch controls (basic)
let touchStartX = null, touchStartY = null;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  if (!gameRunning) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < -40) {
    // swipe up = jump
    if (myPlayer && myPlayer.onGround) { myPlayer.vy = -myPlayer.charData.jumpPower; }
  }
}, { passive: true });

// Window resize
window.addEventListener('resize', () => {
  const canvas = document.getElementById('game-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
